name: Verifica e Aggiorna Tag HV

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Esegui verifica HV'
        required: false
        default: 'true'
        type: boolean

jobs:
  verifica-hv:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      # 1. Checkout del repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      # 3. Installa dipendenze
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      # 4. Esegue lo script di verifica
      - name: Run verification script
        run: |
          python UpdateNew/verificahv.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # 5. Controlla se ci sono modifiche
      - name: Check for changes
        id: git-check
        run: |
          if git status --porcelain | grep -q "Catalogo.json"; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📝 Modifiche rilevate in Catalogo.json"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Nessuna modifica rilevata"
          fi
          
      # 6. Commit e push delle modifiche
      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add UpdateNew/Catalogo.json
          git commit -m "🤖 Aggiornamento automatico tag HV"
          git push
          
      # 7. Log finale
      - name: Final log
        if: always()
        run: |
          echo "✅ Script completato!"
          if [ "${{ steps.git-check.outputs.changes }}" == "true" ]; then
            echo "📊 Catalogo.json aggiornato con nuovi tag HV"
          else
            echo "ℹ️ Nessuna modifica necessaria"
          fi
