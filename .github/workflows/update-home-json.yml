name: Auto Update Catalog

on:
  schedule:
    # Mattina (08:00)
    - cron: "0 8 * * *"
    # Mezzanotte
    - cron: "0 0 * * *"
  workflow_dispatch: # avvio manuale

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Installa dipendenze
        run: pip install requests

      - name: 🔑 Imposta token
        run: echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: 🕒 Esegui script corretto
        run: |
          HOUR=$(date -u +%H)

          echo "Ora UTC: $HOUR"

          if [ "$HOUR" -eq "08" ]; then
            echo "Eseguo AggiornamentoNew.py"
            python UpdateNew/AggiornamentoNew.py
          elif [ "$HOUR" -eq "00" ]; then
            echo "Eseguo AggiornamentoCatalogoVecchio.py"
            python UpdateNew/AggiornamentoCatalogoVecchio.py
          else
            echo "Nessuno script da eseguire"
          fi

      - name: 💾 Commit e push se cambiamenti
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git diff --cached --quiet || git commit -m "🤖 Auto update catalog"
          git push
